name: Daily AI & IT RSS Generator

on:
  schedule:
    # Spúšťa sa každý deň o 06:00 UTC (08:00 nášho času)
    - cron: '0 6 * * *'
  workflow_dispatch: # Umožňuje spustiť automatizáciu aj manuálne z rozhrania GitHubu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v4

      - name: Nastavenie Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Inštalácia závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generovanie RSS feedov pomocou AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python generate_rss.py

      - name: Publikovanie RSS na GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
